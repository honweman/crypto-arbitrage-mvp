name: deploy

# Manual-only trigger: deploying a live trading service on every merge is
# riskier than a human (or an authorized agent) pressing the button.
# Trigger from the Actions tab, `gh workflow run deploy`, or the API.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true

# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DEPLOY_SSH_KEY      private key authorized on the server
#   DEPLOY_HOST         target as user@host
# Optional:
#   DEPLOY_DIR          remote app dir   (default /opt/crypto-arbitrage-mvp)
#   DEPLOY_SERVICE      systemd unit     (default crypto-arb-web.service)
#   DEPLOY_KNOWN_HOSTS  ssh-keyscan output for the host; if unset, the host
#                       key is fetched at run time (trust-on-first-use)

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo 'Confirmation input must be exactly "deploy".' >&2
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test before deploy
        run: |
          python -m compileall -q src tests
          python -m pytest -q

      - name: Set up SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "DEPLOY_SSH_KEY and DEPLOY_HOST secrets must be configured." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${DEPLOY_HOST#*@}" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 644 ~/.ssh/known_hosts
          {
            echo "Host *"
            echo "  IdentityFile ~/.ssh/id_deploy"
            echo "  IdentitiesOnly yes"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy
        env:
          CRYPTO_ARB_DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          CRYPTO_ARB_DEPLOY_DIR: ${{ secrets.DEPLOY_DIR || '/opt/crypto-arbitrage-mvp' }}
          CRYPTO_ARB_DEPLOY_SERVICE: ${{ secrets.DEPLOY_SERVICE || 'crypto-arb-web.service' }}
        run: bash scripts/deploy_cloud.sh

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
